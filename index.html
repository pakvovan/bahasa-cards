<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Bahasa · Карточки слов</title>

  <!-- PWA: установка на домашний экран -->
  <link rel="manifest" href="manifest.json?v=9">
  <meta name="theme-color" content="#e8453c">
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=9">
  <link rel="icon" type="image/png" href="favicon-64.png?v=9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bahasa">

  <link rel="stylesheet" href="styles.css?v=9">

  <script>
    // раннее перехватывание события установки (Android/Chrome) — чтобы не упустить
    window.addEventListener("beforeinstallprompt", function (e) {
      e.preventDefault();
      window._installEvent = e;
      window.dispatchEvent(new Event("install-available"));
    });
    // регистрация service worker для офлайн-режима
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</head>
<body>
  <div id="app">
    <header>
      <div class="head-top">
        <div>
          <h1>🇮🇩 Bahasa · Карточки</h1>
          <div class="sub">Учим индонезийский по карточкам</div>
        </div>
        <div id="userbar"></div>
      </div>
      <div class="stats" id="stats"></div>
    </header>
    <nav class="tabs" id="tabs"></nav>
    <div id="baseswitch"></div>
    <main id="view"></main>
    <button id="fab" class="hidden" title="Добавить слово" aria-label="Добавить слово">+</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js?v=9"></script>
  <script src="data/dictionary.js?v=9"></script>
  <script src="store.js?v=9"></script>
  <script src="app.js?v=9"></script>
</body>
</html>
